<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inkcast</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede7d9;
    --amber: #c8872a;
    --amber-light: #e8a84a;
    --amber-dim: rgba(200,135,42,0.15);
    --shadow: rgba(26,18,8,0.18);
    --muted: #8a7a68;
    --serif: 'Playfair Display', Georgia, serif;
    --mono: 'DM Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  .brand {
    font-family: var(--serif);
    font-size: 3.5rem;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }

  .brand span { color: var(--amber); }

  .tagline {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .drop-zone {
    width: 100%;
    max-width: 420px;
    border: 2px dashed var(--amber);
    border-radius: 2px;
    padding: 3.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(200,135,42,0.03);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    background: var(--amber-dim);
    border-style: solid;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

  .drop-zone h2 {
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }

  .drop-zone p {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .format-badges {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1.1rem;
  }

  .format-badge {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    padding: 0.18rem 0.55rem;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .badge-epub { border: 1px solid var(--amber); color: var(--amber); }
  .badge-pdf  { border: 1px solid #b43c28; color: #b43c28; }

  #player-screen {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
    position: relative;
    z-index: 1;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--cream);
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 10;
  }

  .topbar-brand { font-family: var(--serif); font-style: italic; font-size: 1.4rem; color: var(--ink); }
  .topbar-brand span { color: var(--amber); }

  .book-title-top {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink);
    padding: 0.4rem;
    border-radius: 4px;
    font-size: 1.1rem;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }
  .btn-icon:hover { color: var(--amber); }

  #chapters-panel {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    pointer-events: none;
  }
  #chapters-panel.open { pointer-events: all; }

  .panel-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(26,18,8,0.45);
    opacity: 0;
    transition: opacity 0.25s;
  }
  #chapters-panel.open .panel-backdrop { opacity: 1; }

  .panel-drawer {
    position: relative;
    width: min(320px, 85vw);
    height: 100%;
    background: var(--cream);
    overflow-y: auto;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 4px 0 24px var(--shadow);
    display: flex;
    flex-direction: column;
  }
  #chapters-panel.open .panel-drawer { transform: translateX(0); }

  .panel-header {
    padding: 1.25rem 1.25rem 0.75rem;
    border-bottom: 1px solid rgba(26,18,8,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--cream);
    z-index: 1;
  }

  .panel-header h3 {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  .chapter-list { list-style: none; padding: 0.5rem 0; flex: 1; }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .chapter-item:hover { background: rgba(200,135,42,0.08); }
  .chapter-item.active { border-left-color: var(--amber); background: var(--amber-dim); }

  .chapter-num { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); min-width: 2rem; text-align: right; }
  .chapter-name { font-size: 0.9rem; font-weight: 400; line-height: 1.3; color: var(--ink); }
  .chapter-item.active .chapter-name { font-weight: 700; }

  .content-area {
    flex: 1;
    padding: 1.5rem 1.25rem 10rem;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  .chapter-heading {
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    line-height: 1.2;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chapter-meta {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .type-pill {
    font-family: var(--mono);
    font-size: 0.55rem;
    padding: 0.1rem 0.45rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 400;
  }
  .pill-epub { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(200,135,42,0.3); }
  .pill-pdf  { background: rgba(180,60,40,0.1); color: #b43c28; border: 1px solid rgba(180,60,40,0.25); }

  #text-display {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .spoken-word { background: var(--amber-dim); border-radius: 2px; }

  .progress-bar-track {
    height: 2px;
    background: var(--cream);
    width: 100%;
    margin-bottom: 1.5rem;
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--amber);
    width: 0%;
    transition: width 0.5s linear;
    border-radius: 1px;
  }

  .player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--ink);
    color: var(--paper);
    z-index: 20;
    border-top: 2px solid var(--amber);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .player-inner {
    padding: 0.9rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .player-row { display: flex; align-items: center; gap: 0.75rem; }
  .player-info { flex: 1; overflow: hidden; }

  .player-chapter-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--paper);
  }

  .player-chapter-pos {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.1em;
  }

  .controls { display: flex; align-items: center; gap: 0.5rem; }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--paper);
    cursor: pointer;
    font-size: 1.3rem;
    padding: 0.3rem;
    transition: color 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn:hover { color: var(--amber-light); }

  .ctrl-btn.play-btn {
    background: var(--amber);
    color: var(--ink);
    font-size: 1.1rem;
    width: 2.6rem;
    height: 2.6rem;
  }
  .ctrl-btn.play-btn:hover { background: var(--amber-light); }

  .speed-row { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

  .speed-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .speed-btns { display: flex; gap: 0.3rem; }

  .speed-btn {
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(245,240,232,0.12);
    color: rgba(245,240,232,0.6);
    font-family: var(--mono);
    font-size: 0.62rem;
    padding: 0.18rem 0.45rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speed-btn.active, .speed-btn:hover {
    background: var(--amber);
    color: var(--ink);
    border-color: var(--amber);
  }

  .voice-select {
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(245,240,232,0.12);
    color: rgba(245,240,232,0.7);
    font-family: var(--mono);
    font-size: 0.62rem;
    padding: 0.18rem 0.4rem;
    border-radius: 2px;
    cursor: pointer;
    max-width: 140px;
    flex: 1;
  }
  .voice-select option { background: var(--ink); color: var(--paper); }

  #loading {
    position: fixed;
    inset: 0;
    background: var(--paper);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 1rem;
  }

  .loader-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .loader-bar { width: 120px; height: 2px; background: var(--cream); border-radius: 1px; overflow: hidden; }
  .loader-bar-fill {
    height: 100%;
    background: var(--amber);
    animation: loadSlide 1.2s ease-in-out infinite;
  }
  @keyframes loadSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  .toast {
    position: fixed;
    bottom: 8rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0.5rem 1rem;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
    border-left: 3px solid var(--amber);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    .brand { font-size: 5rem; }
    .content-area { padding: 2rem 2rem 12rem; }
    #text-display { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div id="loading">
  <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.8rem;color:#1a1208">Ink<span style="color:#c8872a">cast</span></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div class="loader-text" id="loading-text">Parsing file...</div>
</div>

<!-- Upload Screen -->
<div id="upload-screen">
  <div class="brand">Ink<span>cast</span></div>
  <div class="tagline">listen to any book, anywhere</div>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".epub,.pdf">
    <span class="drop-icon">📖</span>
    <h2>Drop your book here</h2>
    <p>or tap to choose a file</p>
    <div class="format-badges">
      <span class="format-badge badge-epub">epub</span>
      <span class="format-badge badge-pdf">pdf</span>
    </div>
  </div>

  <div style="margin-top:2rem;font-family:'DM Mono',monospace;font-size:0.65rem;color:#8a7a68;text-align:center;line-height:1.8">
    All processing happens on-device.<br>Your book never leaves your phone.
  </div>
</div>

<!-- Player Screen -->
<div id="player-screen">
  <div class="topbar">
    <button class="btn-icon" id="open-chapters-btn" title="Chapters / Pages">☰</button>
    <div class="book-title-top" id="book-title-display"></div>
    <button class="btn-icon" id="new-book-btn" title="Load new book" style="font-size:0.9rem">＋</button>
  </div>

  <div class="content-area">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="chapter-heading" id="chapter-title"></div>
    <div class="chapter-meta" id="chapter-meta"></div>
    <div id="text-display"></div>
  </div>
</div>

<!-- Chapters / Pages Panel -->
<div id="chapters-panel">
  <div class="panel-backdrop" id="panel-backdrop"></div>
  <div class="panel-drawer">
    <div class="panel-header">
      <h3 id="panel-heading">Contents</h3>
      <button class="btn-icon" id="close-chapters-btn">✕</button>
    </div>
    <ul class="chapter-list" id="chapter-list"></ul>
  </div>
</div>

<!-- Player Bar -->
<div class="player-bar" id="player-bar" style="display:none">
  <div class="player-inner">
    <div class="player-row">
      <div class="player-info">
        <div class="player-chapter-name" id="player-chapter-name">-</div>
        <div class="player-chapter-pos" id="player-pos">-</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="prev-chapter-btn" title="Previous">⏮</button>
        <button class="ctrl-btn" id="rewind-btn" title="Rewind 15s">↺</button>
        <button class="ctrl-btn play-btn" id="play-btn">▶</button>
        <button class="ctrl-btn" id="forward-btn" title="Forward 30s">↻</button>
        <button class="ctrl-btn" id="next-chapter-btn" title="Next">⏭</button>
      </div>
    </div>
    <div class="speed-row">
      <span class="speed-label">Speed</span>
      <div class="speed-btns" id="speed-btns">
        <button class="speed-btn" data-speed="0.75">0.75×</button>
        <button class="speed-btn active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="1.25">1.25×</button>
        <button class="speed-btn" data-speed="1.5">1.5×</button>
        <button class="speed-btn" data-speed="2">2×</button>
      </div>
      <select class="voice-select" id="voice-select" title="Voice"></select>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- JSZip for EPUB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- PDF.js for PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ---- STATE ----
const state = {
  chapters: [],
  currentChapter: 0,
  isPlaying: false,
  speed: 1,
  voice: null,
  wordIndex: 0,
  words: [],
  charOffset: 0,
  bookId: '',
  fileType: '', // 'epub' | 'pdf'
};

const $ = id => document.getElementById(id);
const uploadScreen   = $('upload-screen');
const playerScreen   = $('player-screen');
const playerBar      = $('player-bar');
const fileInput      = $('file-input');
const dropZone       = $('drop-zone');
const textDisplay    = $('text-display');
const chapterTitle   = $('chapter-title');
const chapterMeta    = $('chapter-meta');
const bookTitleTop   = $('book-title-display');
const playerChName   = $('player-chapter-name');
const playerPos      = $('player-pos');
const progressFill   = $('progress-fill');
const chapterList    = $('chapter-list');
const chaptersPanel  = $('chapters-panel');
const voiceSelect    = $('voice-select');

// ---- VOICES ----
let voices = [];
function loadVoices() {
  voices = speechSynthesis.getVoices();
  const en = voices.filter(v => v.lang.startsWith('en'));
  const pool = en.length ? en : voices;
  voiceSelect.innerHTML = pool.map(v =>
    `<option value="${voices.indexOf(v)}">${v.name.replace('Google ','').replace(' English','')}</option>`
  ).join('');
  const pref = voices.find(v => /samantha|karen|daniel|moira/i.test(v.name)) || pool[0];
  if (pref) { state.voice = pref; voiceSelect.value = voices.indexOf(pref); }
}
speechSynthesis.addEventListener('voiceschanged', loadVoices);
loadVoices();
voiceSelect.addEventListener('change', () => {
  state.voice = voices[parseInt(voiceSelect.value)];
  if (state.isPlaying) { stopSpeech(); startSpeech(); }
});

// ---- LOADING ----
function showLoading(msg) {
  $('loading-text').textContent = msg || 'Parsing file...';
  $('loading').style.display = 'flex';
}
function hideLoading() { $('loading').style.display = 'none'; }

// ---- EPUB PARSER ----
async function parseEpub(file) {
  showLoading('Parsing epub...');
  try {
    const zip = await JSZip.loadAsync(file);
    const containerXml = await zip.file('META-INF/container.xml').async('string');
    const rootfilePath = containerXml.match(/full-path="([^"]+)"/)[1];
    const opfText = await zip.file(rootfilePath).async('string');
    const parser = new DOMParser();
    const opf = parser.parseFromString(opfText, 'application/xml');

    const titleEl = opf.querySelector('title');
    const bookTitle = titleEl ? titleEl.textContent.trim() : file.name.replace('.epub','');

    const spineItems = Array.from(opf.querySelectorAll('spine itemref')).map(el => el.getAttribute('idref'));
    const manifest = {};
    opf.querySelectorAll('manifest item').forEach(el => {
      manifest[el.getAttribute('id')] = el.getAttribute('href');
    });
    const basePath = rootfilePath.includes('/') ? rootfilePath.split('/').slice(0,-1).join('/') + '/' : '';

    // NCX titles
    let tocTitles = {};
    const ncxId = opf.querySelector('spine')?.getAttribute('toc');
    if (ncxId && manifest[ncxId]) {
      try {
        const ncxText = await zip.file(basePath + manifest[ncxId]).async('string');
        const ncx = parser.parseFromString(ncxText, 'application/xml');
        ncx.querySelectorAll('navPoint').forEach(np => {
          const src = np.querySelector('content')?.getAttribute('src')?.split('#')[0];
          const label = np.querySelector('navLabel text')?.textContent?.trim();
          if (src && label) tocTitles[src] = label;
        });
      } catch(e) {}
    }

    // EPUB3 nav
    if (!Object.keys(tocTitles).length) {
      try {
        const navItem = Array.from(opf.querySelectorAll('manifest item'))
          .find(el => el.getAttribute('properties')?.includes('nav'));
        if (navItem) {
          const navText = await zip.file(basePath + navItem.getAttribute('href')).async('string');
          const navDoc = parser.parseFromString(navText, 'text/html');
          navDoc.querySelectorAll('nav a').forEach(a => {
            const href = a.getAttribute('href')?.split('#')[0];
            const label = a.textContent.trim();
            if (href && label) tocTitles[href] = label;
          });
        }
      } catch(e) {}
    }

    const chapters = [];
    for (const id of spineItems) {
      const href = manifest[id];
      if (!href) continue;
      const fileObj = zip.file(basePath + href) || zip.file(href);
      if (!fileObj) continue;
      try {
        const html = await fileObj.async('string');
        const doc = parser.parseFromString(html, 'text/html');
        doc.querySelectorAll('script,style,nav,[role="doc-toc"]').forEach(el => el.remove());
        let text = (doc.body || doc.documentElement).innerText
          || (doc.body || doc.documentElement).textContent || '';
        text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
        if (text.length < 30) continue;
        const hrefBase = href.split('/').pop();
        let title = tocTitles[hrefBase] || tocTitles[href];
        if (!title) {
          const h = doc.querySelector('h1,h2,h3');
          title = h ? h.textContent.trim() : `Section ${chapters.length + 1}`;
        }
        chapters.push({ title, text });
      } catch(e) {}
    }
    hideLoading();
    return { title: bookTitle, chapters, type: 'epub' };
  } catch(e) {
    hideLoading();
    showToast('Could not parse epub: ' + e.message);
    return null;
  }
}

// ---- PDF PARSER ----
async function parsePdf(file) {
  showLoading('Loading pdf...');
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const numPages = pdf.numPages;

    // Try to get outline (bookmarks)
    let outline = [];
    try { outline = await pdf.getOutline() || []; } catch(e) {}

    // Map outline items to page numbers
    let chapterBreaks = [];
    if (outline.length > 0) {
      for (const item of outline) {
        try {
          if (!item.dest) continue;
          let dest = item.dest;
          if (typeof dest === 'string') dest = await pdf.getDestination(dest);
          if (dest && dest[0]) {
            const pageIndex = await pdf.getPageIndex(dest[0]);
            chapterBreaks.push({ pageNum: pageIndex + 1, title: item.title });
          }
        } catch(e) {}
      }
      chapterBreaks.sort((a, b) => a.pageNum - b.pageNum);
    }

    // Extract all page text
    const pageTexts = [];
    for (let i = 1; i <= numPages; i++) {
      if (i % 5 === 0) {
        showLoading(`Reading page ${i} of ${numPages}...`);
        await new Promise(r => setTimeout(r, 0));
      }
      try {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // Preserve line breaks using transform y-position
        let lastY = null;
        let lines = [];
        let currentLine = [];
        for (const item of content.items) {
          const y = item.transform[5];
          if (lastY !== null && Math.abs(y - lastY) > 5) {
            lines.push(currentLine.join(''));
            currentLine = [];
          }
          currentLine.push(item.str);
          lastY = y;
        }
        if (currentLine.length) lines.push(currentLine.join(''));
        pageTexts.push(lines.join('\n').trim());
      } catch(e) { pageTexts.push(''); }
    }

    const bookTitle = file.name.replace('.pdf','');
    let chapters = [];

    if (chapterBreaks.length >= 2) {
      for (let i = 0; i < chapterBreaks.length; i++) {
        const start = chapterBreaks[i].pageNum - 1;
        const end = i + 1 < chapterBreaks.length ? chapterBreaks[i+1].pageNum - 1 : numPages;
        const text = pageTexts.slice(start, end).join('\n\n').trim();
        if (text.length > 20) chapters.push({ title: chapterBreaks[i].title, text });
      }
    }

    // Fallback: chunk pages if no usable outline
    if (chapters.length < 2) {
      chapters = [];
      const chunkSize = numPages <= 10 ? 1 : numPages <= 50 ? 3 : numPages <= 200 ? 5 : 10;
      for (let i = 0; i < numPages; i += chunkSize) {
        const chunk = pageTexts.slice(i, i + chunkSize).join('\n\n').trim();
        if (chunk.length < 20) continue;
        const startPage = i + 1;
        const endPage = Math.min(i + chunkSize, numPages);
        const title = chunkSize === 1 ? `Page ${startPage}` : `Pages ${startPage}\u2013${endPage}`;
        chapters.push({ title, text: chunk });
      }
    }

    hideLoading();
    return { title: bookTitle, chapters, type: 'pdf' };
  } catch(e) {
    hideLoading();
    showToast('Could not parse PDF: ' + e.message);
    return null;
  }
}

// ---- FILE HANDLING ----
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && (f.name.endsWith('.epub') || f.name.endsWith('.pdf'))) handleFile(f);
  else showToast('Please drop an .epub or .pdf file');
});

async function handleFile(file) {
  let result;
  if (file.name.toLowerCase().endsWith('.pdf')) result = await parsePdf(file);
  else if (file.name.toLowerCase().endsWith('.epub')) result = await parseEpub(file);
  else { showToast('Unsupported format — use .epub or .pdf'); return; }

  if (!result || !result.chapters.length) { showToast('No readable content found in this file'); return; }

  state.chapters = result.chapters;
  state.fileType = result.type;
  state.bookId = file.name + '_' + file.size;
  bookTitleTop.textContent = result.title;

  $('panel-heading').textContent = result.type === 'pdf' ? 'Pages' : 'Chapters';

  const saved = loadProgress();
  state.currentChapter = Math.min(saved.chapter || 0, result.chapters.length - 1);
  state.charOffset = saved.charOffset || 0;

  buildChapterList();
  showPlayer();
  loadChapter(state.currentChapter, state.charOffset);

  if (saved.chapter > 0 || saved.charOffset > 0) {
    const unit = result.type === 'pdf' ? 'section' : 'chapter';
    showToast(`Resumed at ${unit} ${state.currentChapter + 1}`);
  }
}

// ---- UI ----
function showPlayer() {
  uploadScreen.style.display = 'none';
  playerScreen.style.display = 'flex';
  playerBar.style.display = 'block';
}

function showUpload() {
  stopSpeech();
  playerScreen.style.display = 'none';
  playerBar.style.display = 'none';
  uploadScreen.style.display = 'flex';
  fileInput.value = '';
}

$('new-book-btn').addEventListener('click', showUpload);

// ---- CHAPTER LIST ----
function buildChapterList() {
  chapterList.innerHTML = state.chapters.map((ch, i) =>
    `<li class="chapter-item${i===state.currentChapter?' active':''}" data-idx="${i}">
       <span class="chapter-num">${String(i+1).padStart(2,'0')}</span>
       <span class="chapter-name">${escHtml(ch.title)}</span>
     </li>`
  ).join('');
  chapterList.querySelectorAll('.chapter-item').forEach(el => {
    el.addEventListener('click', () => {
      closeChapters();
      stopSpeech();
      loadChapter(parseInt(el.dataset.idx), 0);
    });
  });
}

function updateChapterListActive() {
  chapterList.querySelectorAll('.chapter-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === state.currentChapter);
  });
}

// ---- LOAD CHAPTER / SECTION ----
function loadChapter(idx, charOffset) {
  state.currentChapter = idx;
  state.charOffset = charOffset || 0;
  const ch = state.chapters[idx];
  const total = state.chapters.length;
  const isPdf = state.fileType === 'pdf';
  const unit = isPdf ? 'Section' : 'Chapter';

  chapterTitle.textContent = ch.title;

  const pillClass = isPdf ? 'pill-pdf' : 'pill-epub';
  const pillLabel = isPdf ? 'PDF' : 'EPUB';
  chapterMeta.innerHTML =
    `<span class="type-pill ${pillClass}">${pillLabel}</span>` +
    `<span>${unit} ${idx+1} of ${total}&nbsp;&nbsp;·&nbsp;&nbsp;${wordCount(ch.text)} words</span>`;

  playerChName.textContent = ch.title;
  renderText(ch.text, -1);
  updateChapterListActive();
  updateProgress();
  updatePosDisplay();
  saveProgress();
}

function wordCount(t) { return t.trim().split(/\s+/).length.toLocaleString(); }

function renderText(text, highlightWordIdx) {
  state.words = text.split(/(\s+)/);
  let html = '';
  let wordI = 0;
  for (const chunk of state.words) {
    if (/\s+/.test(chunk)) {
      html += escHtml(chunk);
    } else {
      if (wordI === highlightWordIdx) {
        html += `<mark class="spoken-word" id="sw">${escHtml(chunk)}</mark>`;
      } else {
        html += escHtml(chunk);
      }
      wordI++;
    }
  }
  textDisplay.innerHTML = html;
}

// ---- SPEECH ----
function startSpeech() {
  if (!('speechSynthesis' in window)) { showToast('Speech not supported in this browser'); return; }
  speechSynthesis.cancel();

  const ch = state.chapters[state.currentChapter];
  let text = state.charOffset > 0 && state.charOffset < ch.text.length
    ? ch.text.slice(state.charOffset)
    : ch.text;

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = state.speed;
  if (state.voice) utter.voice = state.voice;
  state.wordIndex = 0;

  const wordsBeforeOffset = ch.text.slice(0, state.charOffset).split(/\s+/).filter(Boolean).length;

  utter.addEventListener('boundary', (e) => {
    if (e.name !== 'word') return;
    state.wordIndex++;
    renderText(ch.text, wordsBeforeOffset + state.wordIndex - 1);
    const sw = document.getElementById('sw');
    if (sw) sw.scrollIntoView({ block: 'center', behavior: 'smooth' });
    // Update charOffset approximation
    state.charOffset = Math.min(
      ch.text.length - 1,
      (state.charOffset || 0) + (e.charIndex || 0)
    );
    saveProgress();
    updateProgress();
    updatePosDisplay();
  });

  utter.addEventListener('end', () => {
    state.isPlaying = false;
    $('play-btn').textContent = '▶';
    state.charOffset = 0;
    if (state.currentChapter < state.chapters.length - 1) {
      setTimeout(() => {
        loadChapter(state.currentChapter + 1, 0);
        startSpeech();
        state.isPlaying = true;
        $('play-btn').textContent = '⏸';
      }, 800);
    }
  });

  state.isPlaying = true;
  $('play-btn').textContent = '⏸';
  speechSynthesis.speak(utter);
}

function stopSpeech() {
  speechSynthesis.cancel();
  state.isPlaying = false;
  $('play-btn').textContent = '▶';
}

function togglePlay() {
  if (state.isPlaying) stopSpeech(); else startSpeech();
}

function skip(seconds) {
  const ch = state.chapters[state.currentChapter];
  const charsPerSec = (state.speed * 150 * 5) / 60;
  state.charOffset = Math.max(0, Math.min(ch.text.length - 1, state.charOffset + Math.round(seconds * charsPerSec)));
  if (state.isPlaying) { stopSpeech(); startSpeech(); state.isPlaying = true; $('play-btn').textContent = '⏸'; }
  updatePosDisplay();
}

// ---- CONTROLS ----
$('play-btn').addEventListener('click', togglePlay);
$('rewind-btn').addEventListener('click', () => skip(-15));
$('forward-btn').addEventListener('click', () => skip(30));
$('prev-chapter-btn').addEventListener('click', () => {
  if (state.currentChapter > 0) { stopSpeech(); loadChapter(state.currentChapter - 1, 0); }
});
$('next-chapter-btn').addEventListener('click', () => {
  if (state.currentChapter < state.chapters.length - 1) { stopSpeech(); loadChapter(state.currentChapter + 1, 0); }
});

$('speed-btns').addEventListener('click', e => {
  const btn = e.target.closest('.speed-btn');
  if (!btn) return;
  state.speed = parseFloat(btn.dataset.speed);
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b === btn));
  if (state.isPlaying) { stopSpeech(); startSpeech(); state.isPlaying = true; $('play-btn').textContent = '⏸'; }
});

$('open-chapters-btn').addEventListener('click', () => chaptersPanel.classList.add('open'));
$('close-chapters-btn').addEventListener('click', closeChapters);
$('panel-backdrop').addEventListener('click', closeChapters);
function closeChapters() { chaptersPanel.classList.remove('open'); }

// ---- PROGRESS ----
function updateProgress() {
  const pct = state.chapters.length > 1 ? (state.currentChapter / (state.chapters.length - 1)) * 100 : 0;
  progressFill.style.width = pct + '%';
}

function updatePosDisplay() {
  const ch = state.chapters[state.currentChapter];
  const pct = ch.text.length > 0 ? Math.round((state.charOffset / ch.text.length) * 100) : 0;
  const unit = state.fileType === 'pdf' ? 'section' : 'chapter';
  playerPos.textContent = `${pct}% through ${unit}`;
}

// ---- PERSISTENCE ----
function saveProgress() {
  if (!state.bookId) return;
  try {
    localStorage.setItem('inkcast_' + state.bookId, JSON.stringify({
      chapter: state.currentChapter,
      charOffset: state.charOffset,
      ts: Date.now(),
    }));
  } catch(e) {}
}

function loadProgress() {
  if (!state.bookId) return {};
  try {
    const raw = localStorage.getItem('inkcast_' + state.bookId);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

// ---- UTILS ----
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Wake lock
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
$('play-btn').addEventListener('click', () => { if (state.isPlaying) requestWakeLock(); });
</script>
